---
# Test data to demonstrate sibling sorting bug
# Expected order: Charlie (married), Eve (unmarried), Frank (married)
# Bug behavior: Would show Eve first because she's unmarried

trees:
- id: parent1
  marriages:
  - spouse:
      id: parent2
    children:
    # Intentional order: married, unmarried, married
    - id: charlie    # First child - MARRIED
      marriages:
      - spouse:
          id: diana
    - id: eve        # Second child - UNMARRIED
    - id: frank      # Third child - MARRIED
      marriages:
      - spouse:
          id: grace

people:
  parent1:
    name: Parent One
    sex: M
  parent2:
    name: Parent Two
    sex: F
  charlie:
    name: Charlie (Married - 1st)
    sex: M
  diana:
    name: Diana
    sex: F
  eve:
    name: Eve (Unmarried - 2nd)
    sex: F
  frank:
    name: Frank (Married - 3rd)
    sex: M
  grace:
    name: Grace
    sex: F
